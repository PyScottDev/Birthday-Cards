<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Happy Father's Day!</title>
    <!-- Google Fonts Preconnect and Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="banner">
            <h1>Happy Father's Day!</h1>
        </header>

        <main class="card">
            <!-- Accessible button wrapper for the image triggers lightbox -->
            <div class="image-wrapper" id="image-trigger" role="button" aria-label="View photo in fullscreen" tabindex="0">
                <img id="dad-photo" src="images/dad-1.jpg" alt="A dad photo representing Father's Day">
                <div class="zoom-indicator" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="11" y1="8" x2="11" y2="14"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </div>
            </div>

            <div class="joke-container" id="joke-scroller">
                <p id="joke-text" class="joke-text">Loading a classic dad joke...</p>
            </div>

            <p class="card-caption">Official Dad Joke Generator</p>

            <button id="next-btn" class="btn" aria-label="Get another dad joke">Another one, Dad</button>
        </main>
    </div>

    <!-- Lightbox Dialog Overlay -->
    <dialog id="lightbox" aria-label="Fullscreen photo viewer">
        <div class="lightbox-content">
            <button id="close-lightbox" class="close-btn" aria-label="Close fullscreen view">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <img id="lightbox-img" src="images/dad-1.jpg" alt="Fullscreen view of the dad photo">
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
